[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    smoke: fast smoke tests (run on every commit)
    slow:  slow integration tests (run on CI only)

log_cli = true
log_cli_level = WARNING

